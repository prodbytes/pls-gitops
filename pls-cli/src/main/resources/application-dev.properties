# pls.tui-enabled=false

# Show DEBUG logs from our own code in dev mode (prod stays at INFO,
# see application.properties)
quarkus.log.category."pls".level=DEBUG
# Message first; simple class name (no package) and thread at the end of the line
quarkus.log.console.format=%d{yyyy-MM-dd HH:mm:ss,SSS} %-5p %s%e [%c{1}] (%t)%n

