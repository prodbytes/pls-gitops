quarkus.banner.enabled=false
quarkus.analytics.disabled=true

# JNA starts a cleaner thread and org.jline.nativ loads a native library in
# class initializers; neither may run during native-image build-time init.
quarkus.native.additional-build-args=--initialize-at-run-time=com.sun.jna,--initialize-at-run-time=org.jline.nativ,--initialize-at-run-time=org.jline.terminal.impl.jna,--initialize-at-run-time=org.jline.terminal.impl.jansi

# TamboUI discovers its terminal backend via ServiceLoader; register all
# META-INF/services providers in the native image (Quarkus disables
# GraalVM's UseServiceLoaderFeature by default).
quarkus.native.auto-service-loader-registration=true
# JLine loads a native library; grant native access when running `java -jar` (JEP 472)
quarkus.package.jar.manifest.attributes."Enable-Native-Access"=ALL-UNNAMED

# Name the output "pls" instead of "pls-runner"
quarkus.package.add-runner-suffix=false
