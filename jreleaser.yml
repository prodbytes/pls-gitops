# JReleaser configuration: publishes the native `pls` binary as a GitHub
# release. Run via `make release` (see scripts/make-release.sh); requires
# JRELEASER_GITHUB_TOKEN. Project version is injected from the pom by the
# release script as JRELEASER_PROJECT_VERSION.
project:
  name: pls
  description: GitOps CLI built with Quarkus
  links:
    homepage: https://github.com/prodbytes/pls-gitops
  authors:
    - ProdBytes
  license: MIT
  inceptionYear: "2026"
  stereotype: CLI

release:
  github:
    owner: prodbytes
    name: pls-gitops
    tagName: 'v{{projectVersion}}'
    releaseName: 'pls {{projectVersion}}'
    overwrite: false
    changelog:
      formatted: ALWAYS
      preset: conventional-commits

distributions:
  pls:
    type: FLAT_BINARY
    executable:
      name: pls
    artifacts:
      - path: pls-cli/target/pls
        platform: linux-x86_64
