# Runs `make release` (Docker Hub image + GitHub release via JReleaser)
# whenever a tag ending in "GA" is pushed, or on manual dispatch.
# Requires the DOCKERHUB_USERNAME and DOCKERHUB_TOKEN repository secrets.
name: Release

on:
  push:
    tags:
      - '*GA'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      JRELEASER_VERSION: 1.25.0
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # full history so JReleaser can build the conventional-commits changelog
          fetch-depth: 0

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Install JReleaser
        run: |
          curl -sSfL -o "$RUNNER_TEMP/jreleaser.zip" \
            "https://github.com/jreleaser/jreleaser/releases/download/v$JRELEASER_VERSION/jreleaser-standalone-$JRELEASER_VERSION-linux-x86_64.zip"
          unzip -q "$RUNNER_TEMP/jreleaser.zip" -d "$RUNNER_TEMP"
          echo "$RUNNER_TEMP/jreleaser-standalone-$JRELEASER_VERSION-linux-x86_64/bin" >> "$GITHUB_PATH"

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DOCKERHUB_NAMESPACE: prodbytes
        run: make release
